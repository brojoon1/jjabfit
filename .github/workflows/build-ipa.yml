name: Build unsigned IPA

# 수동 실행(Actions 탭의 Run workflow 버튼) 또는 main 브랜치에 push 할 때 빌드합니다.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Xcode 버전 확인
        run: xcodebuild -version

      - name: 빌드 (코드 서명 없이)
        run: |
          set -o pipefail
          xcodebuild \
            -project JjabFit.xcodeproj \
            -scheme JjabFit \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: IPA 패키징
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/JjabFit.app"
          if [ ! -d "$APP_PATH" ]; then echo "빌드 결과물(.app)을 찾을 수 없습니다"; exit 1; fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/JjabFit.app
          zip -qry JjabFit.ipa Payload
          echo "IPA 생성 완료:"; ls -lh JjabFit.ipa

      - name: IPA 업로드 (다운로드용)
        uses: actions/upload-artifact@v4
        with:
          name: JjabFit-unsigned-ipa
          path: JjabFit.ipa
          if-no-files-found: error
